<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Comunidad Reporta</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
}

h1{
text-align:center;
color:#1d3557;
}

input{

width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;

}

button{

padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1d3557;
color:white;

}

.card{

padding:20px;
background:#f8f8f8;
border-left:5px solid #1d3557;
margin-top:20px;
border-radius:10px;

}

.editar{

background:#0077cc;
padding:8px;
color:white;
border-radius:5px;

}

.eliminar{

background:red;
padding:8px;
color:white;
border-radius:5px;

}

</style>

</head>

<body>

<div class="container">

<h1>📍 Comunidad Reporta</h1>

<form action="/crear" method="post">

<input type="text"
name="titulo"
placeholder="Título"
required>

<input type="text"
name="descripcion"
placeholder="Descripción"
required>

<input type="text"
name="ubicacion"
placeholder="Ubicación"
required>

<button type="submit">
Crear Reporte
</button>

</form>

<hr>

{% for r in reportes %}

<div class="card">

<h3>{{r.titulo}}</h3>

<p>{{r.descripcion}}</p>

<p>
<b>Ubicación:</b>
{{r.ubicacion}}
</p>

<p>
<b>Estado:</b>
{{r.estado}}
</p>

<a
class="editar"
href="/editar/{{r.id}}">
Editar
</a>

<form
action="/eliminar/{{r.id}}"
method="post"
style="display:inline;">

<button
class="eliminar"
onclick="return confirm('¿Eliminar reporte?')">

Eliminar

</button>

</form>
