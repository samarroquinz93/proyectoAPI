<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Editar reporte</title>

<style>

body{

font-family:Arial;
background:#eef2f7;
padding:40px;

}

.container{

max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;

}

input,select{

width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;

}

button{

margin-top:15px;
padding:10px;
width:100%;
background:#1d3557;
color:white;
border:none;
border-radius:8px;

}

</style>

</head>

<body>

<div class="container">

<h2>Editar reporte</h2>

<form action="/editar/{{reporte.id}}" method="post">

<input
type="text"
name="titulo"
value="{{reporte.titulo}}"
required>

<input
type="text"
name="descripcion"
value="{{reporte.descripcion}}"
required>

<input
type="text"
name="ubicacion"
value="{{reporte.ubicacion}}"
required>

<select name="estado">

<option
value="Pendiente">

Pendiente

</option>

<option
value="En proceso">

En proceso

</option>

<option
value="Resuelto">

Resuelto

</option>

</select>

<button type="submit">

Guardar cambios

</button>

</form>

</div>

</body>
</html>
